# ==========================================
# SERVIDOR
# ==========================================
server.port=${PORT:8081}

# ==========================================
# BANCO DE DADOS (Neon)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.jackson.time-zone=America/Sao_Paulo

# ==========================================
# POOL DE THREADS
# ==========================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20

# ==========================================
# MERCADO PAGO
# ==========================================
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}

# ==========================================
# EVOLUTION API
# ==========================================
evolution.api.url=${EVOLUTION_API_URL}
evolution.api.key=${EVOLUTION_API_KEY}

# ==========================================
# GOOGLE CALENDAR
# ==========================================
google.calendar.credentials.file=${GOOGLE_CREDENTIALS:/app/service-account-key.json}

# ==========================================
# APLICAÇĂO
# ==========================================
app.base.url=https://calflow.pages.dev

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}

# ==========================================
# EMAIL (SMTP Gmail)
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# CORS
# ==========================================
cors.allowed.origins=https://calflow.pages.dev,https://www.calflow.app.br,https://calflow.app.br,http://localhost:3000

# ==========================================
# LOGS
# ==========================================
logging.level.root=WARN
logging.level.com.luancal.calflow=INFO